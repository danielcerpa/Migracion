<div id="access-denied-modal" class="access-denied-overlay" style="display: none;">
    <div class="access-denied-content">
        <div class="access-denied-icon">
            <i data-lucide="shield-alert" style="width: 2rem; height: 2rem;"></i>
        </div>
        <h2 class="access-denied-title">Acceso Denegado</h2>
        <p class="access-denied-description">
            Sus permisos han sido eliminados o su cuenta está inactiva. <br>
            <strong>Por favor, contáctese con su administrador para recuperar el acceso.</strong>
        </p>

        <button id="access-denied-logout" class="access-denied-button">
            <i data-lucide="log-out" style="width: 1.125rem; height: 1.125rem;"></i>
            Cerrar Sesión
        </button>
    </div>
</div>
